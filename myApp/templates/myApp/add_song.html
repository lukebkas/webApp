<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Song</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        label {
            display: block;
            margin: 10px 0;
        }
        input[type="text"], textarea {
            width: 100%;
            max-width: 500px;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 8px 16px;
            margin-top: 12px;
        }
        .error {
            color: #a00;
        }
        .success {
            color: #070;
        }
    </style>
</head>
<body>
    <h1>Add Song</h1>

    {% if success %}
        <p class="success">Song added successfully.</p>
        <script>
            if (window.opener) {
                window.opener.location.reload();
                window.close();
            }
        </script>
    {% else %}
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {% for column, value in initial_values %}
                <label>
                    {{ column|capfirst }}
                    <input
                        type="text"
                        name="{{ column }}"
                        value="{{ value }}"
                    />
                </label>
            {% endfor %}
            <button type="submit">Save Song</button>
        </form>
    {% endif %}
</body>
</html>
